name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create placeholder environment.ts
        run: echo "export const environment = {};" > src/environments/environment.ts

      - name: Inject production environment variables
        run: |
          sed -i "s|<PROD_SUPABASE_URL>|${{ secrets.PROD_SUPABASE_URL }}|g" src/environments/environment.prod.ts
          sed -i "s|<PROD_SUPABASE_ANON_KEY>|${{ secrets.PROD_SUPABASE_ANON_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|<PROD_R2_WORKER_URL>|${{ secrets.PROD_R2_WORKER_URL }}|g" src/environments/environment.prod.ts
          sed -i "s|<PROD_R2_API_KEY>|${{ secrets.PROD_R2_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|<PROD_TURN_API_KEY>|${{ secrets.PROD_TURN_API_KEY }}|g" src/environments/environment.prod.ts

      - name: Build production
        run: npm run build:prod

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/bam-p2p-file-sharing/browser --project-name=bamfile --branch=main
