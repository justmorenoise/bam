name = "bam-worker-pre"
main = "src/index.ts"
compatibility_date = "2024-09-01"

[[r2_buckets]]
binding = "BAM_BUCKET"
bucket_name = "bam-transfers-pre"

[triggers]
crons = ["0 */6 * * *"]

[vars]
ALLOWED_ORIGINS = "https://pre.bamfile.com,http://localhost:4200,https://localhost:4200,https://10.0.0.6:4200"
# API_KEY is a secret — set via: wrangler secret put API_KEY --config wrangler.preprod.toml
