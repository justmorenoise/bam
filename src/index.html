<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Bam! - Secure File Sharing</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
          content="Bam! Trasferimento file sicuro, veloce e privato.">
    <meta name="theme-color" content="#6366f1">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bamfile.com">
    <meta property="og:title" content="Bam! Fast & Secure File Sharing">
    <meta property="og:image" content="https://bamfile.com/assets/imgs/share/bamfile_en.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:description" content="Share files up to 1 GB for free. Secure streaming via Cloudflare R2, native TLS 1.3 encryption. No account needed.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest" crossorigin="use-credentials">

    <script>
        if (typeof global === 'undefined') {
            var global = window;
        }
        if (typeof process === 'undefined') {
            var process = {
                env: {NODE_DEBUG: undefined}, nextTick: function (fn) {
                    setTimeout(fn, 0);
                }
            };
        }
    </script>
    <script type="module">
        import {Buffer} from 'https://cdn.jsdelivr.net/npm/buffer@6.0.3/+esm';

        window.Buffer = Buffer;
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google tag (gtag.js) — Consent Mode v2 defaults PRIMA del caricamento di gtag.js.
         La CMP Google (Funding Choices / IAB TCF 2.x) aggiornerà il consenso automaticamente.
         <PROD_GA_ID> viene sostituito a build-time dal workflow GitHub Actions. -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('consent', 'default', {
            analytics_storage:  'denied',
            ad_storage:         'denied',
            ad_user_data:       'denied',
            ad_personalization: 'denied',
            wait_for_update:    500
        });
        gtag('js', new Date());
        // send_page_view: false — i page view sono inviati da AnalyticsService su NavigationEnd
        gtag('config', '<PROD_GA_ID>', { send_page_view: false });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=<PROD_GA_ID>"></script>
    <link rel="preconnect" href="https://www.googletagmanager.com">

    <!-- Preconnect AdSense (caricato in modo lazy da AdService solo su web free) -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com">
    <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6681808248400224"
         crossorigin="anonymous"></script>

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body class="bg-bam-light dark:bg-bam-dark">
<app-root></app-root>
</body>
</html>
