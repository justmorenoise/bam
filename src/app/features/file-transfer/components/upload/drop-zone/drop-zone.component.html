<div
        class="drop-zone p-16 flex flex-col items-center justify-center text-center group cursor-pointer transition-all"
        [class.drag-over]="isDragging()"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
        (click)="fileInput.click()">

    <div class="mb-6 text-slate-600 group-hover:text-orange-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" x2="12" y1="3" y2="15"/>
        </svg>
    </div>
    <p class="text-lg font-bold text-white mb-2">{{ 'DROP_ZONE.DRAG_TITLE' | translate }}</p>
    <p class="text-sm text-slate-400">{{ 'DROP_ZONE.DRAG_DESC' | translate }}</p>
    <p class="text-xs text-slate-600 mt-4 uppercase tracking-widest font-bold">{{ 'DROP_ZONE.NO_LIMIT' | translate }}</p>

    <input
        #fileInput
        type="file"
        class="hidden"
        (change)="onFileSelect($event)">
</div>
